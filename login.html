<body id="login-sayfasi">

    <div class="login-wrapper">
        <div class="login-header">
            <h2>Öğrenci Girişi</h2>

        </div>

        <form action="http://localhost/odev/login.php" method="POST" class="login-form">
            <div class="login-field">
                <label>E-posta Adresi</label>
                <input type="email" name="email" placeholder="tuanna.yildirim@ogr.sakarya.edu.tr" required>
            </div>

            <div class="login-field">
                <label>Şifre</label>
                <input type="password" name="password" placeholder="B251210026" required>
            </div>

            <button type="submit" class="login-submit-btn">GİRİŞ YAP</button>
        </form>
    </div>

</body>
</html>
