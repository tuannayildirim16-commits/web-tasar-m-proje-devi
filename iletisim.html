<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Sakarya Üniversitesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="StyleSheet.css">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="contact-page-wrapper">

    <div class="container" id="app">
        <div class="contact-form-card">
            <h2 class="text-center">İletişim Formu</h2>

            <form action="gonder.php" method="POST" class="contact-form-card">
                <div class="mb-3">
                    <label class="contact-label">Ad Soyad</label>
                    <input type="text" id="name" name="name" class="form-control" v-model="formData.name">
                </div>

                <div class="mb-3">
                    <label class="contact-label">E-posta</label>
                    <input type="email" id="email" name="email" class="form-control" v-model="formData.email">
                </div>

                <div class="mb-3">
                    <label class="contact-label">Telefon</label>
                    <input type="text" id="phone" name="phone" class="form-control" placeholder="05xxxxxxxxx" v-model="formData.phone">
                </div>

                <div class="mb-3">
                    <label class="contact-label">Konu</label>
                    <select name="subject" class="form-select" v-model="formData.subject">
                        <option value="">Seçiniz...</option>
                        <option value="Destek">Teknik Destek</option>
                        <option value="Öneri">Öneri / Şikayet</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="contact-label">Cinsiyet</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" value="Erkek" v-model="formData.gender">
                        <label class="form-check-label">Erkek</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" value="Kadın" v-model="formData.gender">
                        <label class="form-check-label">Kadın</label>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="agree" v-model="formData.agree">
                        <label class="form-check-label">Bilgilerin doğruluğunu onaylıyorum.</label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="contact-label">Mesajınız</label>
                    <textarea name="message" class="form-control" rows="4" v-model="formData.message"></textarea>
                </div>

                <div class="contact-btn-group">
                    <button type="button" onclick="validateWithJS()" class="btn btn-primary px-4">Native JS ile Gönder</button>
                    <button type="button" @click="validateWithVue" class="btn btn-success px-4">Vue.js ile Gönder</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function validateWithJS() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!name || !email || !phone) {
                alert("Native JS: Lütfen tüm alanları doldurun!");
            } else if (!emailRegex.test(email)) {
                alert("Native JS: Geçersiz email formatı!");
            } else if (isNaN(phone) || phone.length < 10) {
                alert("Native JS: Telefon sadece rakam olmalı ve en az 10 haneli olmalıdır!");
            } else {
                alert("Native JS Denetimi Başarılı!");
                document.getElementById('contactForm').submit();
            }
        }

        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    formData: { name: '', email: '', phone: '', subject: '', gender: '', agree: false, message: '' }
                }
            },
            methods: {
                validateWithVue() {
                    if (!this.formData.name || !this.formData.email || !this.formData.phone) {
                        alert("Vue.js: Eksik alanları doldurunuz!");
                    } else if (!this.formData.agree) {
                        alert("Vue.js: Lütfen onay kutusunu işaretleyin!");
                    } else {
                        alert("Vue.js Denetimi Başarılı! Form gönderiliyor...");
                        document.getElementById('contactForm').submit();
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
