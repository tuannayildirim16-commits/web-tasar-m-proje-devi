<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Bursa Şehir Tanıtımı</title>
    <style>
        body {
            background-color: #e0f2f1;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        .ana-kapsayici {
            background: white;
            width: 100%;
            min-height: 100vh;
            padding: 40px;
            box-sizing: border-box;
        }

        h1 {
            color: #2e7d32;
            text-align: center;
            font-size: 70px;
            margin: 20px 0;
        }

        .slider-alani {
            width: 100%;
            height: 600px;
            background-color: #444;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
        }

            .slider-alani img {
                width: 100%;
                height: 100%;
                display: none;
                object-fit: cover;
            }

                .slider-alani img.aktif {
                    display: block !important;
                }

        .buton-grubu {
            text-align: center;
            margin: 30px 0;
        }

        button {
            padding: 20px 50px;
            font-size: 30px;
            cursor: pointer;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            margin: 0 10px;
        }

        .icerik {
            max-width: 1400px;
            margin: 0 auto;
        }

        h2 {
            color: #1b5e20;
            font-size: 50px;
            border-bottom: 5px solid #2e7d32;
            padding-bottom: 10px;
        }

        p, li {
            font-size: 32px;
            line-height: 1.6;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="ana-kapsayici">
        <h1>BURSA</h1>

        <div class="slider-alani">
            <img src="2.jpg" class="aktif">
            <img src="3.jpg">
            <img src="4.jpg">
            <img src="5.jpg">
        </div>

        <div class="buton-grubu">
            <button onclick="degistir(-1)"> ◄ GERİ </button>
            <button onclick="degistir(1)"> İLERİ ► </button>
        </div>

        <div class="icerik">
            <h2>Gezilecek Başlıca Yerler</h2>
            <ul>
                <li>Ulu Camii</li>
                <li>Uludağ</li>
                <li>Cumalıkızık</li>
                <li>Yeşil Türbe</li>
            </ul>
        </div>
    </div>

    <script>
        var sira = 0;
        var resimler = document.querySelectorAll(".slider-alani img");

        function degistir(n) {
            if (resimler.length === 0) return;
            resimler[sira].classList.remove("aktif");
            sira += n;
            if (sira >= resimler.length) sira = 0;
            if (sira < 0) sira = resimler.length - 1;
            resimler[sira].classList.add("aktif");
        }
    </script>

</body>
</html>
