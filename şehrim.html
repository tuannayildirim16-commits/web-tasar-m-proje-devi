<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bursa Şehir Tanıtımı</title>
    <link rel="stylesheet" href="sehrim.css">
</head>
<body>

    <div class="ana-kapsayici">
        <h1>BURSA</h1>

        <!-- Slider Alanı -->
        <div class="slider-cerceve">
            <div class="slider-icerik" id="sliderSerit">
                <img src="2.jpg" alt="Bursa 1">
                <img src="3.jpg" alt="Bursa 2">
                <img src="4.jpg" alt="Bursa 3">
                <img src="5.jpg" alt="Bursa 4">
            </div>
        </div>

        <div class="buton-grubu">
            <button onclick="degistir(-1)"> ◄ GERİ </button>
            <button onclick="degistir(1)"> İLERİ ► </button>
        </div>

        <div class="icerik">
            <h2>Gezilecek Başlıca Yerler</h2>
            <ul>
                <li>Ulu Camii</li>
                <li>Uludağ</li>
                <li>Cumalıkızık</li>
                <li>Yeşil Türbe</li>
            </ul>
        </div>
        <div class="alt-link">
            <a href="web tasarım proje ödevi.html">Ana Sayfaya Dön</a>
        </div>
    </div>
    <div style="text-align: center; margin-top: 20px;">

        <a href="sehrim.html?v=1.1" class="btn btn-outline-success mx-2"></a>
      
        </a>
    </div>
    <script>
        var sira = 0;
        const serit = document.getElementById("sliderSerit");
        const toplamResim = document.querySelectorAll(".slider-icerik img").length;

        function degistir(n) {
            sira += n;

            // Sınır kontrolü
            if (sira >= toplamResim) sira = 0;
            if (sira < 0) sira = toplamResim - 1;

            // Şeridi yatayda kaydırıyoruz (her resim %100 genişlikte olduğu için)
            serit.style.transform = "translateX(" + (-sira * 100) + "%)";
        }
    </script>

</body>
</html>
